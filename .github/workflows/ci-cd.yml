name: CI/CD — Task Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/taskmanager-api
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test backend
        working-directory: ./backend
        run: |
          npm install
          npm test

      - name: Test frontend build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

  build-and-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API image
        run: |
          docker build \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            ./backend

      - name: Build Frontend image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL

      - name: Push API image
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Push Frontend image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "Deployment ready!"
          echo "API:      ${{ env.API_IMAGE }}:${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "========================================"
          echo "To deploy on any server:"
          echo "docker compose pull && docker compose up -d"
